<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerClass - منصة التعليم الذكي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>جاري التحقق...</p>
        </div>
    </div>

    <!-- Main Container (shown when not auto-logged in) -->
    <div id="main-container" class="main-container" style="display:none;">
        <!-- Hero Section -->
        <div class="hero">
            <div class="hero-content">
                <h1 class="logo-text">🎓 ServerClass</h1>
                <p class="tagline">منصة التعليم الذكي بالذكاء الاصطناعي</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button id="btn-signup" class="btn btn-primary btn-lg" onclick="goSignup()">
                إنشاء حساب جديد
            </button>
            <button id="btn-login" class="btn btn-secondary btn-lg" onclick="goLogin()">
                تسجيل الدخول
            </button>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="error-msg" style="display:none;"></div>
    </div>

    <!-- App iframe (shown when user is authenticated) -->
    <iframe id="app-frame" class="app-frame" style="display:none;"
            allow="microphone; camera; autoplay; clipboard-write"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads">
    </iframe>

    <script src="js/fingerprint.js"></script>
    <script src="js/api.js"></script>
    <script>
        /**
         * Main Site Controller.
         * Simplified: No more auth in iframes.
         *
         * Flow:
         * 1. Page load → check device token → auto-login or show buttons
         * 2. Signup button → redirect to signup.smartclass.com.ly
         * 3. Login button → redirect to login.smartclass.com.ly
         * 4. Auto-login → iframe server with /auto-login?token=...&username=...
         * 5. Listen for messages from iframe (logout, force_logout)
         */

        const SIGNUP_SITE = 'https://signup.smartclass.com.ly';
        const LOGIN_SITE = 'https://login.smartclass.com.ly';

        let _currentToken = null;

        function showLoading(msg) {
            const el = document.getElementById('loading-screen');
            if (el) {
                el.style.display = 'flex';
                const p = el.querySelector('p');
                if (p && msg) p.textContent = msg;
            }
        }

        function hideLoading() {
            const el = document.getElementById('loading-screen');
            if (el) el.style.display = 'none';
        }

        function showMain() {
            document.getElementById('main-container').style.display = 'flex';
            document.getElementById('app-frame').style.display = 'none';
        }

        function showApp(url) {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'none';
            const frame = document.getElementById('app-frame');
            frame.src = url;
            frame.style.display = 'block';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            if (el) {
                el.textContent = msg;
                el.style.display = 'block';
                setTimeout(function() { el.style.display = 'none'; }, 8000);
            }
        }

        // Simple redirects - no more iframe auth
        function goSignup() {
            window.location.href = SIGNUP_SITE;
        }

        function goLogin() {
            window.location.href = LOGIN_SITE;
        }

        // Auto-login check on page load
        async function init() {
            showLoading('جاري التحقق...');

            _currentToken = DeviceFingerprint.getToken();
            console.log('Device token:', _currentToken);

            try {
                const result = await API.checkToken(_currentToken);

                if (result.ok && result.found) {
                    console.log('Auto-login:', result.username, 'on server', result.server_num);
                    const autoUrl = result.server_url + '/auto-login?token=' +
                        encodeURIComponent(_currentToken) +
                        '&username=' + encodeURIComponent(result.username);

                    showApp(autoUrl);
                    return;
                }
            } catch (e) {
                console.error('Token check failed:', e);
            }

            // No user found - show main page with signup/login buttons
            hideLoading();
            showMain();
        }

        // Listen for messages from iframe (logout only - no more auth messages)
        window.addEventListener('message', function(event) {
            const origin = event.origin || '';
            const isValidOrigin = origin.includes('serverclass') && origin.includes('hf.space');

            if (!isValidOrigin) return;

            const data = event.data;
            if (!data || typeof data !== 'object') return;

            console.log('Message from server:', data.type);

            if (data.type === 'force_logout') {
                document.getElementById('app-frame').src = '';
                document.getElementById('app-frame').style.display = 'none';
                window.location.href = LOGIN_SITE + '?reason=force_logout&msg=' +
                    encodeURIComponent(data.message || 'تم تسجيل الدخول من جهاز آخر');
            }

            if (data.type === 'logout') {
                document.getElementById('app-frame').src = '';
                document.getElementById('app-frame').style.display = 'none';
                showMain();
            }
        });

        // Start
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
