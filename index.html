<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerClass - منصة التعليم الذكي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>جاري التحقق...</p>
        </div>
    </div>

    <!-- Main Container (shown when not auto-logged in) -->
    <div id="main-container" class="main-container" style="display:none;">
        <!-- Hero Section -->
        <div class="hero">
            <div class="hero-content">
                <h1 class="logo-text">🎓 ServerClass</h1>
                <p class="tagline">منصة التعليم الذكي بالذكاء الاصطناعي</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button id="btn-signup" class="btn btn-primary btn-lg" onclick="goSignup()">
                إنشاء حساب جديد
            </button>
            <button id="btn-login" class="btn btn-secondary btn-lg" onclick="goLogin()">
                تسجيل الدخول
            </button>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="error-msg" style="display:none;"></div>
    </div>

    <!-- App iframe (shown when user is authenticated) -->
    <iframe id="app-frame" class="app-frame" style="display:none;"
            allow="microphone; camera; autoplay; clipboard-write"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads">
    </iframe>

<script src="js/fingerprint.js"></script>
<script src="js/api.js"></script>
<script>
    const SIGNUP_SITE = 'https://signup.smartclass.info.gf';
    const LOGIN_SITE = 'https://login.smartclass.info.gf';

    let _currentToken = null;

    function showLoading(msg) {
        var el = document.getElementById('loading-screen');
        if (el) {
            el.style.display = 'flex';
            var p = el.querySelector('p');
            if (p && msg) p.textContent = msg;
        }
    }

    function hideLoading() {
        var el = document.getElementById('loading-screen');
        if (el) el.style.display = 'none';
    }

    function showMain() {
        document.getElementById('main-container').style.display = 'flex';
        document.getElementById('app-frame').style.display = 'none';
    }

    function showApp(url) {
        document.getElementById('main-container').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'none';
        var frame = document.getElementById('app-frame');
        frame.src = url;
        frame.style.display = 'block';
    }

    function showError(msg) {
        var el = document.getElementById('error-msg');
        if (el) {
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 8000);
        }
    }

    function goSignup() {
        window.location.href = SIGNUP_SITE;
    }

    function goLogin() {
        window.location.href = LOGIN_SITE;
    }

    // ═══════════════════════════════════════════════════
    //  TOKEN STORAGE - Multiple layers for Safari safety
    // ═══════════════════════════════════════════════════

    function saveToken(token) {
        if (!token) return;

        // Layer 1: localStorage
        try {
            localStorage.setItem('sc_device_token', token);
        } catch(e) {}

        // Layer 2: sessionStorage (survives page refresh, not tab close)
        try {
            sessionStorage.setItem('sc_device_token', token);
        } catch(e) {}

        // Layer 3: Cookie on current domain
        try {
            var expires = new Date();
            expires.setFullYear(expires.getFullYear() + 1);
            document.cookie = 'sc_device_token=' + token +
                ';expires=' + expires.toUTCString() +
                ';path=/;SameSite=Lax;Secure';
        } catch(e) {}
    }

    function loadToken() {
        var token = null;

        // Try localStorage
        try {
            token = localStorage.getItem('sc_device_token');
            if (token && token.trim()) return token.trim();
        } catch(e) {}

        // Try sessionStorage
        try {
            token = sessionStorage.getItem('sc_device_token');
            if (token && token.trim()) return token.trim();
        } catch(e) {}

        // Try cookie
        try {
            var match = document.cookie.match(/(^| )sc_device_token=([^;]+)/);
            if (match && match[2] && match[2].trim()) return match[2].trim();
        } catch(e) {}

        return null;
    }

    function clearAllTokens() {
        try { localStorage.removeItem('sc_device_token'); } catch(e) {}
        try { sessionStorage.removeItem('sc_device_token'); } catch(e) {}
        try {
            document.cookie = 'sc_device_token=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
        } catch(e) {}
    }

    function saveUserInfo(username, serverUrl, serverNum) {
        // Save user info so we can auto-login even if Main DB is slow
        try {
            localStorage.setItem('sc_username', username);
            localStorage.setItem('sc_server_url', serverUrl);
            localStorage.setItem('sc_server_num', String(serverNum));
        } catch(e) {}
        try {
            sessionStorage.setItem('sc_username', username);
            sessionStorage.setItem('sc_server_url', serverUrl);
            sessionStorage.setItem('sc_server_num', String(serverNum));
        } catch(e) {}
    }

    function loadUserInfo() {
        var username = null;
        var serverUrl = null;
        var serverNum = null;

        try {
            username = localStorage.getItem('sc_username');
            serverUrl = localStorage.getItem('sc_server_url');
            serverNum = localStorage.getItem('sc_server_num');
        } catch(e) {}

        if (!username) {
            try {
                username = sessionStorage.getItem('sc_username');
                serverUrl = sessionStorage.getItem('sc_server_url');
                serverNum = sessionStorage.getItem('sc_server_num');
            } catch(e) {}
        }

        if (username && serverUrl) {
            return { username: username, serverUrl: serverUrl, serverNum: serverNum };
        }
        return null;
    }

    function clearUserInfo() {
        try {
            localStorage.removeItem('sc_username');
            localStorage.removeItem('sc_server_url');
            localStorage.removeItem('sc_server_num');
        } catch(e) {}
        try {
            sessionStorage.removeItem('sc_username');
            sessionStorage.removeItem('sc_server_url');
            sessionStorage.removeItem('sc_server_num');
        } catch(e) {}
    }

    // ═══════════════════════════════════════════════════
    //  GET BEST TOKEN
    // ═══════════════════════════════════════════════════

    function getBestToken() {
        // Priority 1: URL params (from signup/login redirect)
        var params = new URLSearchParams(window.location.search);
        var urlToken = params.get('token');

        if (urlToken && urlToken.trim()) {
            console.log('Token from URL:', urlToken.trim());
            saveToken(urlToken.trim());
            return urlToken.trim();
        }

        // Priority 2: Stored token (localStorage/sessionStorage/cookie)
        var stored = loadToken();
        if (stored) {
            console.log('Token from storage:', stored);
            return stored;
        }

        // Priority 3: Generate new
        var newToken = DeviceFingerprint.getToken();
        console.log('Generated new token:', newToken);
        saveToken(newToken);
        return newToken;
    }

    // ═══════════════════════════════════════════════════
    //  AUTO-LOGIN FUNCTION
    // ═══════════════════════════════════════════════════

    function doAutoLogin(username, serverUrl, serverNum, token) {
        console.log('Auto-login:', username, 'on server', serverNum);

        // Save for future visits
        saveToken(token);
        saveUserInfo(username, serverUrl, serverNum);

        var autoUrl = serverUrl + '/auto-login?token=' +
            encodeURIComponent(token) +
            '&username=' + encodeURIComponent(username);

        showApp(autoUrl);
    }

    // ═══════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════

    async function init() {
        showLoading('جاري التحقق...');

        _currentToken = getBestToken();
        console.log('Final token:', _currentToken);

        // Check URL for username (direct redirect from signup/login)
        var params = new URLSearchParams(window.location.search);
        var urlUsername = params.get('username');
        var urlToken = params.get('token');

        // Clean URL
        if (params.has('token') || params.has('username')) {
            var cleanUrl = window.location.origin + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        // ── METHOD 1: Direct redirect from signup/login with username ──
        if (urlUsername && urlUsername.trim()) {
            console.log('Method 1: Direct redirect with username:', urlUsername);

            try {
                var lookupResult = await API.lookupUser(urlUsername.trim());

                if (lookupResult.ok && lookupResult.found) {
                    doAutoLogin(
                        urlUsername.trim(),
                        lookupResult.server_url,
                        lookupResult.server_num,
                        _currentToken
                    );
                    return;
                }
            } catch (e) {
                console.error('Method 1 lookup failed:', e);
            }

            // Lookup failed but we have username - try saved server info
            var savedInfo = loadUserInfo();
            if (savedInfo && savedInfo.username === urlUsername.trim()) {
                console.log('Method 1 fallback: using saved server info');
                doAutoLogin(
                    savedInfo.username,
                    savedInfo.serverUrl,
                    savedInfo.serverNum,
                    _currentToken
                );
                return;
            }
        }

        // ── METHOD 2: Check token in Main DB ──
        try {
            console.log('Method 2: Checking token in Main DB...');
            var result = await API.checkToken(_currentToken);

            if (result.ok && result.found) {
                doAutoLogin(
                    result.username,
                    result.server_url,
                    result.server_num,
                    _currentToken
                );
                return;
            }
            console.log('Method 2: Token not found in Main DB');
        } catch (e) {
            console.error('Method 2 failed:', e);
        }

        // ── METHOD 3: Use saved user info (Safari fallback) ──
        var savedInfo = loadUserInfo();
        if (savedInfo && savedInfo.username && savedInfo.serverUrl) {
            console.log('Method 3: Using saved user info:', savedInfo.username);

            // Verify user still exists on that server
            try {
                var verifyResult = await API.lookupUser(savedInfo.username);

                if (verifyResult.ok && verifyResult.found) {
                    // Re-link token in Main DB (it might have been lost)
                    try {
                        await API.linkToken(savedInfo.username, _currentToken);
                        console.log('Re-linked token in Main DB');
                    } catch(e) {
                        console.warn('Re-link failed:', e);
                    }

                    doAutoLogin(
                        savedInfo.username,
                        verifyResult.server_url,
                        verifyResult.server_num,
                        _currentToken
                    );
                    return;
                }
            } catch (e) {
                console.error('Method 3 verify failed:', e);
            }

            // Even verify failed - try direct auto-login anyway
            // The server will redirect to login if user doesn't exist
            console.log('Method 3 fallback: trying direct auto-login');
            doAutoLogin(
                savedInfo.username,
                savedInfo.serverUrl,
                savedInfo.serverNum,
                _currentToken
            );
            return;
        }

        // ── NOTHING WORKED: Show login/signup buttons ──
        console.log('No auto-login possible, showing buttons');
        hideLoading();
        showMain();
    }

    // ═══════════════════════════════════════════════════
    //  MESSAGE LISTENER
    // ═══════════════════════════════════════════════════

    window.addEventListener('message', function(event) {
        var origin = event.origin || '';
        var isValid = origin.includes('serverclass') && origin.includes('hf.space');
        if (!isValid) return;

        var data = event.data;
        if (!data || typeof data !== 'object') return;

        console.log('Message from server:', data.type);

        if (data.type === 'force_logout') {
            document.getElementById('app-frame').src = '';
            document.getElementById('app-frame').style.display = 'none';
            clearAllTokens();
            clearUserInfo();
            window.location.href = LOGIN_SITE + '?reason=force_logout&msg=' +
                encodeURIComponent(data.message || 'تم تسجيل الدخول من جهاز آخر');
        }

        if (data.type === 'logout') {
            document.getElementById('app-frame').src = '';
            document.getElementById('app-frame').style.display = 'none';
            clearAllTokens();
            clearUserInfo();
            showMain();
        }
    });

    // Start
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
